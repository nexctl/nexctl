app:
  name: nexctl-server
  env: development
  listen_addr: ":8080"
  # 控制面对外根 URL（注册返回的 ws_url 等依赖此项）。可用环境变量 OPSPILOT_SERVER_EXTERNAL_URL 覆盖（非空时优先生效）。
  external_url: "http://localhost:8080"
  shutdown_timeout_seconds: 10
  # 浏览器 WebSocket 调试等场景的 Origin；留空时仅允许无 Origin 的客户端（如 agent）。逗号分隔可用环境变量 OPSPILOT_WEBSOCKET_ALLOWED_ORIGINS 覆盖。
  websocket_allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

mysql:
  dsn: "root:password@tcp(127.0.0.1:3306)/opspilot?charset=utf8mb4&parseTime=true&loc=Local"
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime_minutes: 30

redis:
  addr: "127.0.0.1:6379"
  # 与 docker compose 同时启动 Redis 时，可设置环境变量 OPSPILOT_REDIS_PASSWORD（默认与 compose 中 REDIS_PASSWORD 一致，如 opspilot-dev）；本机无密码 Redis 则留空。
  password: ""
  db: 0

auth:
  jwt_secret: "change-me"
  jwt_expire_hours: 12

node:
  heartbeat_timeout_seconds: 90
  unstable_timeout_seconds: 30
  runtime_points_ttl_seconds: 1800
  runtime_points_max_count: 20
