# 环境变量说明（与仓库根目录 `.env`）：
# 1) Compose 会自动读取「与本文件同目录」的 `.env`，用于解析下方 ${VAR} / ${VAR:-default}（宿主机插值）。
# 2) `environment` 中解析后的键值会传入容器；未在 `environment` 里声明的变量不会自动进容器。
# 3) `env_file`（可选）会把 `.env` 整份注入容器，与显式 `environment` 重复时以后者为准。
version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: nexctl-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: opspilot
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data3:/var/lib/mysql
      - ./server/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./server/migrations/0002_control_tasks.sql:/docker-entrypoint-initdb.d/0002_control_tasks.sql:ro
      - ./server/migrations/0003_task_schedules.sql:/docker-entrypoint-initdb.d/0003_task_schedules.sql:ro
      - ./deploy/mysql/001-seed.sql:/docker-entrypoint-initdb.d/001-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:alpine
    container_name: nexctl-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nexctl-dev}
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: nexctl-server
    env_file:
      - path: .env
        required: false
    working_dir: /app
    volumes:
      - ./server:/app
    environment:
      # 未单独设置 OPSPILOT_SERVER_EXTERNAL_URL 时，默认与下方宿主机映射端口 OPSPILOT_SERVER_HOST_PORT 一致
      OPSPILOT_SERVER_EXTERNAL_URL: ${OPSPILOT_SERVER_EXTERNAL_URL:-http://127.0.0.1:${OPSPILOT_SERVER_HOST_PORT:-8080}}
      OPSPILOT_MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD:-password}@tcp(mysql:3306)/opspilot?charset=utf8mb4&parseTime=true&loc=Local
      OPSPILOT_REDIS_ADDR: redis:6379
      OPSPILOT_REDIS_PASSWORD: ${REDIS_PASSWORD:-nexctl-dev}
      OPSPILOT_JWT_SECRET: ${OPSPILOT_JWT_SECRET:-change-me}
      OPSPILOT_WEBSOCKET_ALLOWED_ORIGINS: ${OPSPILOT_WEBSOCKET_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${OPSPILOT_SERVER_HOST_PORT:-8080}:8080"

  # web:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile.dev
  #   container_name: nexctl-web
  #   working_dir: /app
  #   volumes:
  #     - ./web:/app
  #     - /app/node_modules
  #   command: sh -c "corepack enable && pnpm clean && pnpm install && pnpm run dev:docker"
  #   environment:
  #     CI: "true"
  #     INTERNAL_API_BASE_URL: http://server:8080
  #   depends_on:
  #     - server
  #   ports:
  #     # 绑定 IPv4，避免 Windows 上 localhost→IPv6 导致 ERR_EMPTY_RESPONSE
  #     - "127.0.0.1:3000:3000"

volumes:
  mysql-data3:
  redis-data:
